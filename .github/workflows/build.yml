name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.3.15)'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT_VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: clawpop-dmg
          path: src-tauri/target/release/bundle/dmg/ClawPop_*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update version
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and "${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}"
          } else {
            $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          }
          $currentVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($version -ne $currentVersion) {
            npm version $version --no-git-tag-version
          }

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: clawpop-windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/clawpop-dmg/ClawPop*.dmg
            artifacts/clawpop-windows/ClawPop*.exe
          body: |
            ## ClawPop

            让安装 OpenClaw 变得像打开 App 一样简单。

            ### 新功能
            - 极简设计风格
            - 37+ 主流模型支持（MiniMax、阿里云、Claude、DeepSeek、GPT 等）
            - API Key 实时验证
            - 安装进度实时显示
            - macOS / Windows 跨平台
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
