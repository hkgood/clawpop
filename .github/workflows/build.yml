name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Update version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT_VERSION" ]; then
            npm version $VERSION --no-git-tag-version
          fi
          
      - name: Install dependencies
        run: npm install
        
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__ - OpenClaw 安装向导'
          releaseBody: |
            ## ClawPop v__VERSION__

            让安装 OpenClaw 变得像打开 App 一样简单。

            ### 新功能
            - 极简设计风格
            - 37+ 主流模型支持（MiniMax、阿里云、Claude、DeepSeek、GPT 等）
            - API Key 实时验证
            - 安装进度实时显示
            - macOS / Windows 跨平台

            ### 下载
            - macOS: ClawPop___VERSION___aarch64.dmg
            - Windows: ClawPop___VERSION___x64-setup.exe
          releaseDraft: false
          prerelease: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Update version from tag
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          $currentVersion = (Get-Content package.json | ConvertFrom-Json).version
          if ($version -ne $currentVersion) {
            npm version $version --no-git-tag-version
          }
          
      - name: Install dependencies
        run: npm install
        
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v__VERSION__ - OpenClaw 安装向导'
          releaseBody: |
            ## ClawPop v__VERSION__

            让安装 OpenClaw 变得像打开 App 一样简单。

            ### 新功能
            - 极简设计风格
            - 37+ 主流模型支持（MiniMax、阿里云、Claude、DeepSeek、GPT 等）
            - API Key 实时验证
            - 安装进度实时显示
            - macOS / Windows 跨平台

            ### 下载
            - macOS: ClawPop___VERSION___aarch64.dmg
            - Windows: ClawPop___VERSION___x64-setup.exe
          releaseDraft: false
          prerelease: false
          createRelease: false
